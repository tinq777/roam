name = "roam"
main = "worker.js"
compatibility_date = "2024-01-01"

# Secrets are set via Cloudflare dashboard or wrangler CLI — NOT here.
# Required secrets (set in Cloudflare Workers → Settings → Variables):
#   KIWI_API_KEY
#   RAPIDAPI_KEY
#   BOOKING_AFFILIATE_ID
#   UNSPLASH_ACCESS_KEY
#
# Optional secrets:
#   ANTHROPIC_API_KEY  ← only needed as fallback; app sends key from Settings per-request

[env.production]
name = "roam"
