name: Deploy ROAM

on:
  push:
    branches:
      - main

jobs:
  # ── Deploy Cloudflare Worker ──────────────────────────
  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            IGNAV_API_KEY
            SEARCHAPI_KEY
            SERPAPI_KEY
            RAPIDAPI_KEY
            BOOKING_AFFILIATE_ID
            UNSPLASH_ACCESS_KEY
            ROAM_SECRET_TOKEN
            ANTHROPIC_API_KEY
        env:
          IGNAV_API_KEY: ${{ secrets.IGNAV_API_KEY }}
          SEARCHAPI_KEY: ${{ secrets.SEARCHAPI_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          BOOKING_AFFILIATE_ID: ${{ secrets.BOOKING_AFFILIATE_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          ROAM_SECRET_TOKEN: ${{ secrets.ROAM_SECRET_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ── Deploy GitHub Pages (index.html only) ─────────────
  deploy-pages:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: deploy-worker
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare pages directory
        run: |
          mkdir -p _site
          cp index.html _site/
          cp manifest.json _site/ 2>/dev/null || true
          cp sw.js _site/ 2>/dev/null || true
          cp -r icons _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
